<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>B-City 공유폴더 매트릭스</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Malgun Gothic','맑은 고딕',Arial,sans-serif; background:#f4f5f7; font-size:12px; }

.top-bar {
  background:#1a3460; color:#fff;
  padding:12px 20px; display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:300;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.top-bar h1 { font-size:14px; font-weight:700; }
.top-bar p  { font-size:10px; opacity:.7; margin-top:2px; }
.top-bar-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.btn {
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
  color:#fff; padding:5px 13px; border-radius:5px; cursor:pointer;
  font-size:11px; font-family:inherit; transition:background .15s;
  text-decoration:none; display:inline-flex; align-items:center; gap:5px;
}
.btn:hover { background:rgba(255,255,255,.25); }
.btn-drive { background:#1a73e8; border-color:#1a73e8; }
.btn-drive:hover { background:#1558b0; }

.wrap { overflow:auto; height:calc(100vh - 50px); }

table { border-collapse:collapse; min-width:max-content; }

thead th { position:sticky; top:0; z-index:20; }
thead tr:first-child th  { top:0;  z-index:21; }
thead tr:nth-child(2) th { top:30px; z-index:21; }
thead tr:nth-child(3) th { top:58px; z-index:21; }

th.fix,  td.fix  { position:sticky; left:0;   z-index:15; background:#fff; }
th.fix2, td.fix2 { position:sticky; left:52px; z-index:15; background:#fff; }
thead th.fix, thead th.fix2 { z-index:25; background:#1a3460; }

.hdr-l1 {
  color:#fff; font-weight:700; font-size:11px;
  text-align:center; padding:5px 6px;
  border-right:2px solid #fff;
  border-bottom:1px solid rgba(255,255,255,.3);
}
.hdr-l2 {
  color:#fff; font-weight:600; font-size:10px;
  text-align:center; padding:4px 4px;
  border-right:1px solid rgba(255,255,255,.25);
  border-bottom:1px solid rgba(255,255,255,.3);
  min-width:90px; max-width:110px; line-height:1.3;
}
.hdr-l3 {
  font-size:9px; font-weight:500;
  text-align:center; padding:3px 3px;
  border-right:1px solid #dde; border-bottom:2px solid #aab;
  color:#333; background:#eef0f5;
  min-width:64px; max-width:80px; line-height:1.3;
  white-space:normal; word-break:keep-all;
}
.hdr-date  { background:#1a3460; color:#fff; font-size:11px; text-align:center; padding:4px 6px; min-width:52px; border-right:1px solid rgba(255,255,255,.2); font-weight:700; }
.hdr-event { background:#1a3460; color:#fff; font-size:11px; text-align:center; padding:4px 8px; min-width:148px; border-right:2px solid rgba(255,255,255,.3); font-weight:700; }

tr.data-row { border-bottom:1px solid #e0e3ea; }
tr.data-row:hover { background:#f0f4ff; }
tr.data-row.hl-row { background:#fffbe6; }
tr.data-row.hl-row:hover { background:#fff5cc; }

td.fix  { min-width:52px;  border-right:1px solid #ccc; background:#ffffff; z-index:10; box-shadow:2px 0 4px rgba(0,0,0,.06); }
td.fix2 { min-width:148px; border-right:2px solid #b0b8cc; background:#ffffff; z-index:10; box-shadow:2px 0 6px rgba(0,0,0,.08); }
tr.hl-row td.fix, tr.hl-row td.fix2 { background:#fffbe6; }

.cell-date  { text-align:center; font-size:12px; font-weight:800; color:#0d2245; padding:6px 4px; letter-spacing:0.3px; }
.cell-event { font-size:12px; color:#0d1f3c; padding:6px 10px; font-weight:700; line-height:1.45; }

td.data-cell { text-align:center; padding:3px; border-right:1px solid #e8eaf0; vertical-align:middle; }

.active-block {
  display:inline-flex; align-items:center; justify-content:center;
  width:100%; min-height:28px; border-radius:4px;
  cursor:pointer; transition:filter .15s, transform .1s;
  font-size:10px; font-weight:700; color:#fff;
  padding:3px 4px; line-height:1.2; gap:3px;
}
.active-block:hover { filter:brightness(1.15); transform:scale(1.04); }
.empty-cell { display:inline-block; width:100%; min-height:28px; }

.g1{background:#1F497D;} .g2{background:#17375E;} .g3{background:#244061;}
.g4{background:#403151;} .g5{background:#4F3128;} .g6{background:#3F5128;} .g7{background:#7B3528;}
.hg1{background:#1F497D;} .hg2{background:#17375E;} .hg3{background:#244061;}
.hg4{background:#403151;} .hg5{background:#4F3128;} .hg6{background:#3F5128;} .hg7{background:#7B3528;}

/* ── 팝업 ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:500;
  align-items:center; justify-content:center;
}
.overlay.open { display:flex; }
.popup {
  background:#fff; border-radius:12px;
  padding:22px; max-width:460px; width:92%;
  box-shadow:0 12px 40px rgba(0,0,0,.3);
  max-height:82vh; display:flex; flex-direction:column;
}
.popup-head {
  border-bottom:2px solid #1a3460; padding-bottom:10px; margin-bottom:14px;
}
.popup-date { font-size:11px; color:#1a73e8; font-weight:600; margin-bottom:3px; }
.popup-event { font-size:14px; font-weight:700; color:#1a3460; }
.popup-cat { font-size:11px; color:#666; margin-top:3px; }
.popup-body { overflow-y:auto; flex:1; }
.popup-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:6px;
  margin-bottom:4px; border:1px solid #e8eaf0;
  text-decoration:none; color:#222;
  transition:background .12s, border-color .12s;
  cursor:pointer;
}
.popup-item:hover { background:#e8f0fe; border-color:#1a73e8; }
.popup-item.no-url { opacity:.55; cursor:default; }
.popup-item.no-url:hover { background:#fff; border-color:#e8eaf0; }
.item-icon { font-size:16px; flex-shrink:0; }
.item-label { font-size:12px; font-weight:500; flex:1; line-height:1.3; }
.item-link-icon { font-size:13px; flex-shrink:0; color:#1a73e8; }
.item-link-icon.gray { color:#bbb; }
.no-url-tip { font-size:10px; color:#aaa; margin-top:12px; text-align:center; }
.popup-foot { margin-top:14px; display:flex; gap:8px; justify-content:flex-end; border-top:1px solid #eee; padding-top:12px; }
.btn-mid-link {
  background:#1a73e8; color:#fff; border:none;
  padding:6px 14px; border-radius:6px; cursor:pointer;
  font-size:11px; font-family:inherit;
  display:flex; align-items:center; gap:5px;
  text-decoration:none;
}
.btn-mid-link:hover { background:#1558b0; }
.btn-close {
  background:#f1f3f4; color:#444; border:none;
  padding:6px 14px; border-radius:6px; cursor:pointer;
  font-size:11px; font-family:inherit;
}
.btn-close:hover { background:#e0e0e0; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>🏗️ B-City 공유폴더 매트릭스</h1>
    <p>주요 일정(세로) × 대·중·소 분류(가로) — 셀 클릭 → Google Drive 폴더 열기</p>
  </div>
  <div class="top-bar-right">
    <a class="btn btn-drive" href="https://drive.google.com" target="_blank">
      <img src="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" width="14" style="vertical-align:middle"> Google Drive 열기
    </a>
  </div>
</div>

<div class="wrap"><table id="tbl"></table></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-head">
      <div class="popup-date" id="popDate"></div>
      <div class="popup-event" id="popEvent"></div>
      <div class="popup-cat" id="popCat"></div>
    </div>
    <div class="popup-body" id="popBody"></div>
    <p class="no-url-tip" id="noUrlTip" style="display:none">
      ⚙️ Google Drive에서 폴더 만든 뒤 HTML 파일 내 <b>FOLDER_URLS</b> 객체에 URL을 붙여넣으세요
    </p>
    <div class="popup-foot">
      <a class="btn-mid-link" id="midFolderBtn" href="#" target="_blank">
        📂 중분류 폴더 열기
      </a>
      <button class="btn-close" onclick="closePopup()">닫기</button>
    </div>
  </div>
</div>

// ── 테이블 빌드 ──────────────────────────────────────────────
function build() {
  const tbl = document.getElementById('tbl');
  const thead = tbl.createTHead();

  // 헤더 행1: 대분류
  const hr1 = thead.insertRow();
  ['기간','주요 일정'].forEach((t,i) => {
    const th = document.createElement('th');
    th.rowSpan = 3;
    th.className = i===0 ? 'hdr-date fix' : 'hdr-event fix2';
    th.textContent = t;
    hr1.appendChild(th);
  });
  GROUPS.forEach(g => {
    const th = document.createElement('th');
    th.colSpan = g.mids.length;
    th.className = `hdr-l1 ${g.cls}`;
    th.textContent = g.label;
    hr1.appendChild(th);
  });

  // 헤더 행2: 중분류
  const hr2 = thead.insertRow();
  GROUPS.forEach(g => g.mids.forEach(m => {
    const th = document.createElement('th');
    th.className = `hdr-l2 ${g.cls}`;
    th.innerHTML = m.label.replace('\n','<br>');
    hr2.appendChild(th);
  }));

  // 헤더 행3: 소분류 수
  const hr3 = thead.insertRow();
  GROUPS.forEach(g => g.mids.forEach(m => {
    const th = document.createElement('th');
    th.className = 'hdr-l3';
    th.textContent = `소분류 ${m.subs.length}개`;
    hr3.appendChild(th);
  }));

  // 데이터 행
  const tbody = tbl.createTBody();
  ROWS.forEach(row => {
    const tr = tbody.insertRow();
    tr.className = 'data-row' + (row.hl ? ' hl-row' : '');

    const tdD = tr.insertCell(); tdD.className='fix cell-date';
    tdD.innerHTML = row.date.replace('\n','<br>');

    const tdE = tr.insertCell(); tdE.className='fix2 cell-event';
    tdE.innerHTML = row.event.replace('\n','<br>');
    if(row.hl) tdE.style.fontWeight='700';

    GROUPS.forEach(g => g.mids.forEach(m => {
      const td = tr.insertCell(); td.className='data-cell';
      const items = row.data[m.key];
      if(items && items.length > 0) {
        const blk = document.createElement('div');
        blk.className = `active-block ${g.acls}`;
        const hasUrl = items.some(s => getUrl(s) || getUrl(m.label.replace('\n',' ')));
        blk.innerHTML = `<span>📁</span><span>${items.length}건</span>`;
        blk.onclick = () => openPopup(row, g, m, items);
        td.appendChild(blk);
      } else {
        const e = document.createElement('div'); e.className='empty-cell';
        td.appendChild(e);
      }
    }));
  });
}

// ── 팝업 열기 ────────────────────────────────────────────────
function openPopup(row, g, m, items) {
  document.getElementById('popDate').textContent  = `📅 ${row.date}`;
  document.getElementById('popEvent').textContent = row.event.replace('\n',' ');
  document.getElementById('popCat').textContent   = `${g.label}  ›  ${m.label.replace('\n',' ')}`;

  // 중분류 폴더 버튼
  const midUrl = getUrl(m.label.replace('\n',' ')) || getUrl(g.label);
  const midBtn = document.getElementById('midFolderBtn');
  if(midUrl) {
    midBtn.href = midUrl; midBtn.style.opacity='1'; midBtn.style.pointerEvents='auto';
    midBtn.textContent = '📂 ' + m.label.replace('\n',' ') + ' 폴더 열기';
  } else {
    midBtn.href='#'; midBtn.style.opacity='.4'; midBtn.style.pointerEvents='none';
    midBtn.textContent = '📂 폴더 미설정';
  }

  // 소분류 목록
  let html = ''; let hasNoUrl = false;
  items.forEach(s => {
    const url = getUrl(s) || midUrl;
    if(url) {
      html += `<a class="popup-item" href="${url}" target="_blank" rel="noopener">
        <span class="item-icon">📄</span>
        <span class="item-label">${s}</span>
        <span class="item-link-icon">↗</span>
      </a>`;
    } else {
      hasNoUrl = true;
      html += `<div class="popup-item no-url">
        <span class="item-icon">📄</span>
        <span class="item-label">${s}</span>
        <span class="item-link-icon gray">🔗</span>
      </div>`;
    }
  });
  document.getElementById('popBody').innerHTML = html;
  document.getElementById('noUrlTip').style.display = hasNoUrl ? 'block' : 'none';
  document.getElementById('overlay').classList.add('open');
}
function closePopup() { document.getElementById('overlay').classList.remove('open'); }

build();
