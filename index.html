<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>B-City 공유폴더 매트릭스</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Malgun Gothic','맑은 고딕',Arial,sans-serif; background:#f4f5f7; font-size:12px; }

.top-bar {
  background:#1a3460; color:#fff;
  padding:10px 16px; display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:300;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.top-bar h1 { font-size:13px; font-weight:700; white-space:nowrap; }
.top-bar p  { font-size:9px; opacity:.65; margin-top:1px; white-space:nowrap; }
.top-bar-right { margin-left:auto; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.btn {
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
  color:#fff; padding:5px 11px; border-radius:5px; cursor:pointer;
  font-size:11px; font-family:inherit; transition:background .15s;
  text-decoration:none; display:inline-flex; align-items:center; gap:4px; white-space:nowrap;
}
.btn:hover { background:rgba(255,255,255,.28); }
.btn-drive { background:#1a73e8; border-color:#1a73e8; }
.btn-drive:hover { background:#1558b0; }
.btn-add { background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.4); }
.btn-add:hover { background:rgba(255,255,255,.22); }

.wrap { overflow:auto; height:calc(100vh - 46px); }
table { border-collapse:collapse; min-width:max-content; }

thead th { position:sticky; top:0; z-index:20; }
thead tr:first-child th  { top:0;  z-index:21; }
thead tr:nth-child(2) th { top:30px; z-index:21; }
thead tr:nth-child(3) th { top:60px; z-index:21; }

/* ─── sticky 고정 열 — position:relative 절대 넣지 말 것 ─── */
th.fix,  td.fix  { position:sticky; left:0;   z-index:15; background:#fff; }
th.fix2, td.fix2 { position:sticky; left:52px; z-index:15; background:#fff; }
thead th.fix, thead th.fix2 { z-index:25; background:#1a3460; }

td.fix  { min-width:52px;  border-right:1px solid #ccc; z-index:10; box-shadow:2px 0 4px rgba(0,0,0,.06); }
td.fix2 { min-width:148px; border-right:2px solid #b0b8cc; z-index:10; box-shadow:2px 0 6px rgba(0,0,0,.08); }
tr.hl-row td.fix, tr.hl-row td.fix2 { background:#fffbe6; }

/* inner wrapper — position:relative는 여기에만 */
.ev-wrap { position:relative; padding:6px 10px; min-height:34px; }

.hdr-l1 {
  color:#fff; font-weight:700; font-size:11px;
  text-align:center; padding:5px 6px;
  border-right:2px solid #fff; border-bottom:1px solid rgba(255,255,255,.3);
  cursor:pointer; transition:filter .15s; user-select:none;
}
.hdr-l1:hover { filter:brightness(1.25); }
.hdr-l1 .col-click-hint { font-size:8px; opacity:.6; display:block; margin-top:1px; }

.hdr-l2 {
  color:#fff; font-weight:600; font-size:10px;
  text-align:center; padding:4px 4px 18px;
  border-right:1px solid rgba(255,255,255,.25);
  border-bottom:1px solid rgba(255,255,255,.3);
  min-width:90px; max-width:110px; line-height:1.3;
  cursor:pointer; user-select:none; position:relative;
}
.hdr-l2:hover { filter:brightness(1.2); }

/* 열 제어 버튼 바 */
.col-ctrl-bar {
  display:none; position:absolute; bottom:2px; left:0; right:0;
  justify-content:center; gap:2px; padding:0 3px;
}
.hdr-l2:hover .col-ctrl-bar { display:flex; }
.cc-btn {
  background:rgba(255,255,255,.25); border:none; color:#fff;
  border-radius:3px; padding:1px 4px; font-size:9px;
  cursor:pointer; line-height:1.5; flex-shrink:0;
}
.cc-btn:hover { background:rgba(255,255,255,.65); color:#333; }
.cc-btn.del:hover { background:#dc3545; color:#fff; }

.hdr-l3 {
  font-size:9px; font-weight:500; text-align:center; padding:3px 3px;
  border-right:1px solid #dde; border-bottom:2px solid #aab;
  color:#333; background:#eef0f5;
  min-width:64px; max-width:80px; line-height:1.3;
  white-space:normal; word-break:keep-all;
}
.hdr-date  { background:#1a3460; color:#fff; font-size:11px; text-align:center; padding:4px 6px; min-width:52px; border-right:1px solid rgba(255,255,255,.2); font-weight:700; }
.hdr-event { background:#1a3460; color:#fff; font-size:11px; text-align:center; padding:4px 8px; min-width:148px; border-right:2px solid rgba(255,255,255,.3); font-weight:700; }

tr.data-row { border-bottom:1px solid #e0e3ea; }
tr.data-row:hover { background:#f0f4ff; }
tr.data-row.hl-row { background:#fffbe6; }
tr.data-row.hl-row:hover { background:#fff5cc; }

.cell-date {
  text-align:center; font-size:12px; font-weight:800; color:#0d2245;
  padding:6px 4px; letter-spacing:0.3px; cursor:pointer; transition:background .12s;
}
td.fix:hover { background:#dce8ff!important; cursor:pointer; }
tr.hl-row td.fix:hover { background:#fff5cc!important; }

.cell-event-text {
  font-size:12px; color:#0d1f3c; font-weight:700; line-height:1.45;
}
td.fix2:hover { background:#dce8ff!important; cursor:pointer; }
td.fix2:hover .row-click-hint { opacity:1; }
tr.hl-row td.fix2:hover { background:#fff5cc!important; }
.row-click-hint { font-size:8px; color:#1a73e8; opacity:0; transition:opacity .15s; display:block; margin-top:2px; font-weight:400; }

/* 행 제어 버튼 바 */
.row-ctrl-bar {
  display:none; position:absolute;
  top:50%; right:4px; transform:translateY(-50%);
  gap:2px; align-items:center;
}
td.fix2:hover .row-ctrl-bar { display:flex; }
.rc-btn {
  background:#e8eaf0; border:none; border-radius:3px;
  padding:2px 5px; font-size:9px; cursor:pointer; color:#444;
  line-height:1.4; white-space:nowrap;
}
.rc-btn:hover { background:#1a73e8; color:#fff; }
.rc-btn.del:hover { background:#dc3545; color:#fff; }

td.data-cell { text-align:center; padding:3px; border-right:1px solid #e8eaf0; vertical-align:middle; }
.active-block {
  display:inline-flex; align-items:center; justify-content:center;
  width:100%; min-height:28px; border-radius:4px;
  cursor:pointer; transition:filter .15s, transform .1s;
  font-size:10px; font-weight:700; color:#fff;
  padding:3px 4px; line-height:1.2; gap:3px; user-select:none;
}
.active-block:hover { filter:brightness(1.15); transform:scale(1.04); }
.empty-cell { display:inline-block; width:100%; min-height:28px; border-radius:4px; }
.empty-cell:hover { background:rgba(0,0,0,.04); }

.g1{background:#1F497D;} .g2{background:#17375E;} .g3{background:#244061;}
.g4{background:#403151;} .g5{background:#4F3128;} .g6{background:#3F5128;} .g7{background:#7B3528;}
.hg1{background:#1F497D;} .hg2{background:#17375E;} .hg3{background:#244061;}
.hg4{background:#403151;} .hg5{background:#4F3128;} .hg6{background:#3F5128;} .hg7{background:#7B3528;}

/* ── 팝업 ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:500;
  align-items:center; justify-content:center;
}
.overlay.open { display:flex; }
.popup {
  background:#fff; border-radius:12px; padding:22px; max-width:520px; width:94%;
  box-shadow:0 12px 40px rgba(0,0,0,.3); max-height:85vh; display:flex; flex-direction:column;
}
.popup-head { border-bottom:2px solid #1a3460; padding-bottom:10px; margin-bottom:12px; }
.popup-mode-tag {
  display:inline-block; border-radius:12px; padding:2px 10px;
  font-size:10px; font-weight:700; margin-bottom:6px;
}
.popup-mode-tag.mode-cell  { background:#e8f0fe; color:#1a73e8; }
.popup-mode-tag.mode-row   { background:#e6f4ea; color:#1e7e34; }
.popup-mode-tag.mode-col   { background:#fff3e0; color:#e65100; }
.popup-date  { font-size:11px; color:#1a73e8; font-weight:600; margin-bottom:3px; }
.popup-event { font-size:14px; font-weight:700; color:#1a3460; }
.popup-cat   { font-size:11px; color:#666; margin-top:3px; }
.popup-body  { overflow-y:auto; flex:1; }
.popup-section { margin-bottom:10px; }
.popup-section-title {
  font-size:10px; font-weight:700; color:#555;
  padding:4px 8px; background:#f0f2f5; border-radius:4px;
  margin-bottom:5px; display:flex; align-items:center; gap:6px;
}
.popup-section-badge {
  background:#1a3460; color:#fff; border-radius:10px;
  padding:1px 7px; font-size:9px; font-weight:700;
}
.popup-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:6px; margin-bottom:4px;
  border:1px solid #e8eaf0; text-decoration:none; color:#222;
  transition:background .12s, border-color .12s; cursor:pointer;
}
.popup-item:hover { background:#e8f0fe; border-color:#1a73e8; }
.popup-item.no-url { opacity:.55; cursor:default; }
.popup-item.no-url:hover { background:#fff; border-color:#e8eaf0; }
.item-icon { font-size:15px; flex-shrink:0; }
.item-label { font-size:12px; font-weight:500; flex:1; line-height:1.3; }
.item-link-icon { font-size:13px; flex-shrink:0; color:#1a73e8; }
.item-link-icon.gray { color:#bbb; }
.no-url-tip { font-size:10px; color:#aaa; margin-top:10px; text-align:center; padding:8px; }
.popup-foot { margin-top:12px; display:flex; gap:8px; justify-content:flex-end; border-top:1px solid #eee; padding-top:12px; flex-wrap:wrap; }
.btn-mid-link {
  background:#1a73e8; color:#fff; border:none;
  padding:6px 14px; border-radius:6px; cursor:pointer;
  font-size:11px; font-family:inherit;
  display:flex; align-items:center; gap:5px; text-decoration:none;
}
.btn-mid-link:hover { background:#1558b0; }
.btn-close {
  background:#f1f3f4; color:#444; border:none;
  padding:6px 14px; border-radius:6px; cursor:pointer; font-size:11px; font-family:inherit;
}
.btn-close:hover { background:#e0e0e0; }
.popup-total-badge {
  background:#e8f0fe; color:#1a73e8; border-radius:12px;
  padding:3px 12px; font-size:11px; font-weight:700;
  display:inline-block; margin-bottom:10px;
}

/* ── 컨텍스트 메뉴 ── */
.ctx-menu {
  position:fixed; background:#fff;
  border:1px solid #ddd; border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  z-index:600; min-width:160px; padding:5px 0; display:none;
}
.ctx-menu.open { display:block; }
.ctx-item {
  padding:9px 16px; cursor:pointer; font-size:12px;
  display:flex; align-items:center; gap:8px; color:#222; transition:background .1s;
}
.ctx-item:hover { background:#f0f4ff; }
.ctx-sep { border:none; border-top:1px solid #eee; margin:4px 0; }

/* ── 다이얼로그 ── */
.dlg-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.5); z-index:700;
  align-items:center; justify-content:center;
}
.dlg-overlay.open { display:flex; }
.dlg {
  background:#fff; border-radius:12px; padding:24px; max-width:420px; width:92%;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
}
.dlg h3 { font-size:14px; font-weight:700; color:#1a3460; margin-bottom:14px; }
.dlg label { display:block; font-size:11px; color:#555; font-weight:600; margin-top:12px; margin-bottom:4px; }
.dlg label:first-of-type { margin-top:0; }
.dlg input, .dlg textarea, .dlg select {
  width:100%; border:1px solid #d0d5dd; border-radius:6px;
  padding:8px 10px; font-size:12px; font-family:inherit;
  transition:border-color .15s; outline:none;
}
.dlg input:focus, .dlg textarea:focus, .dlg select:focus { border-color:#1a73e8; }
.dlg textarea { height:75px; resize:vertical; }
.dlg-hint { font-size:10px; color:#999; margin-top:3px; }
.dlg-foot { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; padding-top:14px; border-top:1px solid #eee; }
.dlg-check { display:flex; align-items:center; gap:6px; font-size:11px; cursor:pointer; }
.dlg-check input[type=checkbox] { width:auto; margin:0; cursor:pointer; }
.btn-primary {
  background:#1a73e8; color:#fff; border:none;
  padding:7px 18px; border-radius:6px; cursor:pointer; font-size:12px; font-family:inherit; font-weight:600;
}
.btn-primary:hover { background:#1558b0; }
.btn-secondary {
  background:#f1f3f4; color:#444; border:none;
  padding:7px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-family:inherit;
}
.btn-secondary:hover { background:#e0e0e0; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>🏗️ B-City 공유폴더 매트릭스</h1>
    <p>헤더 클릭 → 열 전체 보기 &nbsp;|&nbsp; 날짜·일정 클릭 → 행 전체 보기 &nbsp;|&nbsp; 셀 우클릭 → 폴더 추가</p>
  </div>
  <div class="top-bar-right">
    <button class="btn btn-add" onclick="showAddRowDlg()">➕ 행 추가</button>
    <button class="btn btn-add" onclick="showAddColDlg()">➕ 열 추가</button>
    <a class="btn btn-drive" href="https://drive.google.com" target="_blank">
      <img src="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" width="13" style="vertical-align:middle"> Google Drive
    </a>
    <button class="btn" onclick="resetAll()" title="사용자 추가 데이터 초기화">🔄 초기화</button>
  </div>
</div>

<div class="wrap"><table id="tbl"></table></div>

<!-- ── 팝업 ── -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePopup()">
  <div class="popup">
    <div class="popup-head">
      <div class="popup-mode-tag" id="popMode"></div>
      <div class="popup-date"  id="popDate"></div>
      <div class="popup-event" id="popEvent"></div>
      <div class="popup-cat"   id="popCat"></div>
    </div>
    <div id="popTotalBadge"></div>
    <div class="popup-body" id="popBody"></div>
    <p class="no-url-tip" id="noUrlTip" style="display:none">
      ⚙️ 우클릭 → 「폴더 추가」에서 Google Drive URL 입력
    </p>
    <div class="popup-foot">
      <a class="btn-mid-link" id="midFolderBtn" href="#" target="_blank" style="display:none">📂 폴더 열기</a>
      <button class="btn-close" onclick="closePopup()">닫기</button>
    </div>
  </div>
</div>

<!-- ── 컨텍스트 메뉴 ── -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxAddFolder">📁 폴더 추가</div>
  <div class="ctx-item" id="ctxSetUrl">🔗 Google Drive URL 설정</div>
  <hr class="ctx-sep">
  <div class="ctx-item" id="ctxRemove" style="color:#dc3545">🗑️ 추가 폴더 삭제</div>
</div>

<!-- ── 행 추가/수정 다이얼로그 ── -->
<div class="dlg-overlay" id="addRowDlg">
  <div class="dlg">
    <h3 id="rowDlgTitle">➕ 행 추가 — 새 주요 일정</h3>
    <label>기간 <span style="color:#999;font-weight:400">(예: 27.06)</span></label>
    <input id="newRowDate" placeholder="YY.MM 또는 YY~YY" maxlength="10">
    <label>주요 일정 명칭</label>
    <input id="newRowEvent" placeholder="예: 착공신고">
    <label style="margin-top:10px">
      <label class="dlg-check">
        <input type="checkbox" id="newRowHl"> 강조 행 (노란 배경)
      </label>
    </label>
    <div class="dlg-foot">
      <button class="btn-secondary" onclick="closeDlg('addRowDlg')">취소</button>
      <button class="btn-primary" id="rowSaveBtn" onclick="saveRow()">추가</button>
    </div>
  </div>
</div>

<!-- ── 열 추가/수정 다이얼로그 ── -->
<div class="dlg-overlay" id="addColDlg">
  <div class="dlg">
    <h3 id="colDlgTitle">➕ 열 추가 — 새 중분류</h3>
    <label>대분류 선택</label>
    <select id="newColGroup"></select>
    <label>중분류 명칭</label>
    <input id="newColLabel" placeholder="예: 리스크 관리(사업)">
    <label>소분류 목록 <span style="color:#999;font-weight:400">(한 줄에 하나씩)</span></label>
    <textarea id="newColSubs" placeholder="예:&#10;리스크 현황표&#10;대응방안 보고서"></textarea>
    <div class="dlg-foot">
      <button class="btn-secondary" onclick="closeDlg('addColDlg')">취소</button>
      <button class="btn-primary" id="colSaveBtn" onclick="saveCol()">추가</button>
    </div>
  </div>
</div>

<!-- ── 폴더 추가 다이얼로그 ── -->
<div class="dlg-overlay" id="addFolderDlg">
  <div class="dlg">
    <h3>📁 폴더 추가</h3>
    <label>폴더 이름</label>
    <input id="newFolderName" placeholder="예: 추가 회의록">
    <label>Google Drive URL <span style="color:#999;font-weight:400">(선택)</span></label>
    <input id="newFolderUrl" placeholder="https://drive.google.com/drive/folders/...">
    <p class="dlg-hint">URL 없이 추가하면 나중에 우클릭 → URL 설정으로 입력 가능합니다</p>
    <div class="dlg-foot">
      <button class="btn-secondary" onclick="closeDlg('addFolderDlg')">취소</button>
      <button class="btn-primary" onclick="saveNewFolder()">추가</button>
    </div>
  </div>
</div>

<!-- ── URL 설정 다이얼로그 ── -->
<div class="dlg-overlay" id="setUrlDlg">
  <div class="dlg">
    <h3>🔗 Google Drive URL 설정</h3>
    <label id="setUrlLabel">폴더 이름</label>
    <input id="setUrlName" placeholder="폴더 이름" readonly style="background:#f5f5f5">
    <label>Google Drive URL</label>
    <input id="setUrlValue" placeholder="https://drive.google.com/drive/folders/...">
    <div class="dlg-foot">
      <button class="btn-secondary" onclick="closeDlg('setUrlDlg')">취소</button>
      <button class="btn-primary" onclick="saveUrl()">저장</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ★ Google Drive 폴더 URL — 아래에 붙여넣으세요
// ════════════════════════════════════════════════════════════════
const BASE_FOLDER_URLS = {
  "사업 총괄 및 기획":"","자산 및 자금관리":"","건설 및 기술관리":"",
  "법무 및 계약관리":"","경영지원 및 총무":"","홍보 및 마케팅":"","보상 및 주민협의":"",
  "사업계획":"","일정 및 공정관리":"","보고 및 회의":"","공문서 및 자료 수발신":"","공통":"",
  "자금조달":"","자금운용":"","회계/세무":"","부동산 자산관리":"","리스크 관리(재무)":"",
  "인허가":"","설계관리":"","공사관리":"","공사비 관리":"","준공 및 사후처리":"",
  "법률자문":"","계약관리":"","소송 및 분쟁":"","내부규정 및 지침":"",
  "법인 기본 서류":"","이사회/주주총회":"","인사/조직":"","총무":"",
  "홍보 및 마케팅비 관리":"","홍보":"","마케팅":"","대외협력":"",
  "보상 민원 예산 관리":"","민원":"","토지보상":"","이주대책":"","생활대책":"",
  "사업타당성":"","사업계획서":"","분야별 보고서":"","공정보고":"","마스터 일정표":"",

const LS = {
  rows:'bcity_rows', cols:'bcity_cols', folders:'bcity_folders', urls:'bcity_urls',
  delRows:'bcity_del_rows', delCols:'bcity_del_cols',
  editRows:'bcity_edit_rows', editCols:'bcity_edit_cols',
  rowOrder:'bcity_row_order', colOrder:'bcity_col_order',
};

let EXTRA_ROWS = [], EXTRA_COLS = [];
let EXTRA_FOLDERS = {}, EXTRA_URLS = {};
let DELETED_ROWS = new Set(), DELETED_COLS = new Set();
let EDITED_ROWS = {}, EDITED_COLS = {};
let ROW_ORDER = [], COL_ORDER = {};

function loadLS() {
  try {
    EXTRA_ROWS    = JSON.parse(localStorage.getItem(LS.rows)    || '[]');
    EXTRA_COLS    = JSON.parse(localStorage.getItem(LS.cols)    || '[]');
    EXTRA_FOLDERS = JSON.parse(localStorage.getItem(LS.folders) || '{}');
    EXTRA_URLS    = JSON.parse(localStorage.getItem(LS.urls)    || '{}');
    DELETED_ROWS  = new Set(JSON.parse(localStorage.getItem(LS.delRows) || '[]'));
    DELETED_COLS  = new Set(JSON.parse(localStorage.getItem(LS.delCols) || '[]'));
    EDITED_ROWS   = JSON.parse(localStorage.getItem(LS.editRows) || '{}');
    EDITED_COLS   = JSON.parse(localStorage.getItem(LS.editCols) || '{}');
    ROW_ORDER     = JSON.parse(localStorage.getItem(LS.rowOrder) || '[]');
    COL_ORDER     = JSON.parse(localStorage.getItem(LS.colOrder) || '{}');
  } catch(e) {
    EXTRA_ROWS=[]; EXTRA_COLS=[]; EXTRA_FOLDERS={}; EXTRA_URLS={};
    DELETED_ROWS=new Set(); DELETED_COLS=new Set();
    EDITED_ROWS={}; EDITED_COLS={}; ROW_ORDER=[]; COL_ORDER={};
  }
}
function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

function getUrl(name) { return EXTRA_URLS[name] || BASE_FOLDER_URLS[name] || ''; }

// ── 데이터 병합 ───────────────────────────────────────────────
function getAllRowIds() {
  const baseIds  = BASE_ROWS.filter(r => !DELETED_ROWS.has(r.id)).map(r => r.id);
  const extraIds = EXTRA_ROWS.map(r => r.id);
  const all = [...baseIds, ...extraIds];
  if (!ROW_ORDER.length) return all;
  const existing = new Set(all);
  const ordered  = ROW_ORDER.filter(id => existing.has(id));
  const rest     = all.filter(id => !ordered.includes(id));
  return [...ordered, ...rest];
}

function getRows() {
  const map = {};
  BASE_ROWS.forEach(r => {
    if (DELETED_ROWS.has(r.id)) return;
    const ed = EDITED_ROWS[r.id];
    map[r.id] = ed ? {...r, ...ed} : {...r};
  });
  EXTRA_ROWS.forEach(r => {
    const ed = EDITED_ROWS[r.id];
    map[r.id] = ed ? {...r, ...ed, _extra:true} : {...r, _extra:true};
  });
  return getAllRowIds().filter(id => map[id]).map(id => map[id]);
}

function getGroups() {
  const base = BASE_GROUPS.map(g => ({
    ...g,
    mids: g.mids
      .filter(m => !DELETED_COLS.has(m.key))
      .map(m => { const ed = EDITED_COLS[m.key]; return ed ? {...m, ...ed} : {...m}; })
  }));
  EXTRA_COLS.forEach(c => {
    if (DELETED_COLS.has(c.key)) return;
    const grp = base.find(g => g.key === c.groupKey);
    if (grp) {
      const ed = EDITED_COLS[c.key];
      grp.mids.push(ed ? {...c, ...ed} : {...c});
    }
  });
  // apply column ordering
  base.forEach(g => {
    const order = COL_ORDER[g.key];
    if (order && order.length) {
      const midMap = {};
      g.mids.forEach(m => midMap[m.key] = m);
      const ordered = order.filter(k => midMap[k]).map(k => midMap[k]);
      const rest    = g.mids.filter(m => !order.includes(m.key));
      g.mids = [...ordered, ...rest];
    }
  });
  return base;
}

function getCellItems(row, midKey) {
  return [...(row.data[midKey] || []),
          ...(EXTRA_FOLDERS[`${row.id}|${midKey}`] || []).map(f => f.name)];
}
function getCellItemsFull(row, midKey) {
  const base  = (row.data[midKey] || []).map(name => ({ name, url:getUrl(name), isExtra:false }));
  const extra = (EXTRA_FOLDERS[`${row.id}|${midKey}`] || []).map(f => ({ name:f.name, url:f.url||getUrl(f.name), isExtra:true }));
  return [...base, ...extra];
}

// ── 순서 이동 ─────────────────────────────────────────────────
function moveRow(id, dir) {
  const order = getAllRowIds();
  const idx = order.indexOf(id);
  if (idx < 0) return;
  const ni = idx + dir;
  if (ni < 0 || ni >= order.length) return;
  [order[idx], order[ni]] = [order[ni], order[idx]];
  ROW_ORDER = order;
  saveLS(LS.rowOrder, ROW_ORDER);
  rebuild();
}

function moveCol(groupKey, key, dir) {
  const groups = getGroups();
  const g = groups.find(g => g.key === groupKey);
  if (!g) return;
  const keys = g.mids.map(m => m.key);
  const idx = keys.indexOf(key);
  if (idx < 0) return;
  const ni = idx + dir;
  if (ni < 0 || ni >= keys.length) return;
  [keys[idx], keys[ni]] = [keys[ni], keys[idx]];
  COL_ORDER[groupKey] = keys;
  saveLS(LS.colOrder, COL_ORDER);
  rebuild();
}

// ── 행 삭제 ───────────────────────────────────────────────────
function deleteRow(id, isExtra) {
  if (!confirm('이 행을 삭제할까요?')) return;
  if (isExtra) {
    EXTRA_ROWS = EXTRA_ROWS.filter(r => r.id !== id);
    saveLS(LS.rows, EXTRA_ROWS);
    ROW_ORDER = ROW_ORDER.filter(x => x !== id);
    saveLS(LS.rowOrder, ROW_ORDER);
  } else {
    DELETED_ROWS.add(id);
    saveLS(LS.delRows, [...DELETED_ROWS]);
    ROW_ORDER = ROW_ORDER.filter(x => x !== id);
    saveLS(LS.rowOrder, ROW_ORDER);
  }
  rebuild();
}

// ── 열 삭제 ───────────────────────────────────────────────────
function deleteCol(groupKey, key, isExtra) {
  if (!confirm('이 열을 숨길까요?')) return;
  if (isExtra) {
    EXTRA_COLS = EXTRA_COLS.filter(c => c.key !== key);
    saveLS(LS.cols, EXTRA_COLS);
    if (COL_ORDER[groupKey]) {
      COL_ORDER[groupKey] = COL_ORDER[groupKey].filter(k => k !== key);
      saveLS(LS.colOrder, COL_ORDER);
    }
  } else {
    DELETED_COLS.add(key);
    saveLS(LS.delCols, [...DELETED_COLS]);
    if (COL_ORDER[groupKey]) {
      COL_ORDER[groupKey] = COL_ORDER[groupKey].filter(k => k !== key);
      saveLS(LS.colOrder, COL_ORDER);
    }
  }
  rebuild();
}

function closePopup() { document.getElementById('overlay').classList.remove('open'); }
function _openPopup() { document.getElementById('overlay').classList.add('open'); }

function renderFolderItem(name, url) {
  if(url) {
    return `<a class="popup-item" href="${url}" target="_blank" rel="noopener">
      <span class="item-icon">📁</span><span class="item-label">${esc(name)}</span>
      <span class="item-link-icon">↗</span></a>`;
  }
  return `<div class="popup-item no-url">
    <span class="item-icon">📁</span><span class="item-label">${esc(name)}</span>
    <span class="item-link-icon gray">🔗</span></div>`;
}

function openCellPopup(row, g, m) {
  const items = getCellItemsFull(row, m.key);
  document.getElementById('popMode').className  = 'popup-mode-tag mode-cell';
  document.getElementById('popMode').textContent = '📌 교집합 보기';
  document.getElementById('popDate').textContent  = `📅 ${row.date}`;
  document.getElementById('popEvent').textContent = row.event.replace('\n',' ');
  document.getElementById('popCat').textContent   = `${g.label}  ›  ${m.label.replace('\n',' ')}`;
  document.getElementById('popTotalBadge').innerHTML = `<div class="popup-total-badge">📁 ${items.length}개 폴더</div>`;
  const midUrl = getUrl(m.label.replace('\n',' ')) || getUrl(g.label);
  const midBtn = document.getElementById('midFolderBtn');
  if(midUrl) {
    midBtn.href = midUrl; midBtn.style.opacity='1'; midBtn.style.pointerEvents='auto';
    midBtn.textContent = '📂 ' + m.label.replace('\n',' ') + ' 폴더 열기';
    midBtn.style.display='flex';
  } else { midBtn.style.display='none'; }
  let html=''; let hasNoUrl=false;
  items.forEach(({name,url}) => { if(!url) hasNoUrl=true; html += renderFolderItem(name,url); });
  document.getElementById('popBody').innerHTML = html || '<p style="color:#aaa;font-size:11px;text-align:center;padding:16px">폴더 없음</p>';
  document.getElementById('noUrlTip').style.display = hasNoUrl ? 'block' : 'none';
  _openPopup();
}

function openRowPopup(row) {
  const groups = getGroups();
  document.getElementById('popMode').className  = 'popup-mode-tag mode-row';
  document.getElementById('popMode').textContent = '📋 행 전체 보기';
  document.getElementById('popDate').textContent  = `📅 ${row.date}`;
  document.getElementById('popEvent').textContent = row.event.replace('\n',' ');
  document.getElementById('popCat').textContent   = '이 일정의 모든 폴더';
  document.getElementById('midFolderBtn').style.display='none';
  document.getElementById('noUrlTip').style.display='none';
  let html=''; let total=0;
  groups.forEach(g => {
    const midsW = g.mids.filter(m => getCellItems(row, m.key).length > 0);
    if(!midsW.length) return;
    html += `<div class="popup-section">
      <div class="popup-section-title" style="color:#fff;background:var(--gc,#1a3460)">
        ${esc(g.label)} <span class="popup-section-badge">${midsW.length}개 중분류</span></div>`;
    midsW.forEach(m => {
      const items = getCellItemsFull(row, m.key);
      total += items.length;
      html += `<div style="margin-left:8px;margin-bottom:8px">
        <div style="font-size:10px;color:#666;font-weight:700;margin-bottom:3px">▸ ${esc(m.label.replace('\n',' '))}</div>`;
      items.forEach(({name,url}) => { html += renderFolderItem(name,url); });
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('popTotalBadge').innerHTML = `<div class="popup-total-badge">📁 총 ${total}개 폴더</div>`;
  document.getElementById('popBody').innerHTML = html || '<p style="color:#aaa;font-size:11px;text-align:center;padding:16px">폴더 없음</p>';
  _openPopup();
}

function openColMidPopup(g, m) {
  const rows = getRows();
  document.getElementById('popMode').className  = 'popup-mode-tag mode-col';
  document.getElementById('popMode').textContent = '📊 열 전체 보기';

function openColGroupPopup(g) {

  document.getElementById('noUrlTip').style.display='none';

  document.getElementById('popBody').innerHTML = html || '<p style="color:#aaa;font-size:11px;text-align:center;padding:16px">폴더 없음</p>';
  _openPopup();
}
